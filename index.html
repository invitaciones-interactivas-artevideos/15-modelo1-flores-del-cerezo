<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invitación Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>

/* =========================
   🎨 ESTILO GLOBAL
   ========================= */
:root{
  --primary:#d4af37;
  --bg:#000;
  --text:#fff;
  --title-font:'Playfair Display', serif;
  --body-font:'Montserrat', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:var(--body-font);
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* =========================
   🎬 BACKGROUND
   ========================= */
.background{
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;
}

.background video,
.background img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.65);
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}

/* =========================
   HERO
   ========================= */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-content{
  animation:fadeUp 1.8s ease;
}

/* 💎 NOMBRE LUJO PREMIUM */
.luxury-name{
  font-family:var(--title-font);
  font-size:3.6rem;
  letter-spacing:2px;

  background:linear-gradient(90deg,#d4af37,#fff3b0,#d4af37);
  background-size:200% auto;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:shine 3s linear infinite, fadeName 2s ease forwards;

  opacity:0;
  transform:translateY(20px);
}

.subtitle{
  margin-top:10px;
  opacity:0.9;
}

/* BOTONES */
.btn{
  margin-top:20px;
  padding:12px 24px;
  border:none;
  border-radius:30px;
  background:var(--primary);
  font-weight:bold;
  cursor:pointer;
}

/* =========================
   SECCIONES
   ========================= */
section{
  padding:60px 20px;
  text-align:center;
}

.box{
  max-width:850px;
  margin:auto;
  background:#141414;
  padding:25px;
  border-radius:15px;
  margin-bottom:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* =========================
   COUNTDOWN PREMIUM
   ========================= */
.countdown{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin-top:15px;
}

.time{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  min-width:85px;
}

.time span{
  display:block;
  font-size:1.7rem;
  color:var(--primary);
  font-weight:bold;
}

/* =========================
   CARRUSEL
   ========================= */
.carousel{
  overflow:hidden;
  border-radius:15px;
}

.slides{
  display:flex;
  animation:slide 12s infinite;
}

.slides img{
  width:100%;
  height:380px;
  object-fit:cover;
}

/* =========================
   ANIMACIONES
   ========================= */
@keyframes shine{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

@keyframes fadeName{
  to{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes slide{
  0%{transform:translateX(0);}
  33%{transform:translateX(-100%);}
  66%{transform:translateX(-200%);}
  100%{transform:translateX(0);}
}

/* BOTÓN LINK */
a.button{
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:var(--primary);
  color:#000;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- =========================
   🎬 BACKGROUND (EDITABLE)
   ========================= -->
<div class="background">

  <!-- VIDEO (default) -->
  <video autoplay muted loop playsinline>
    <source src="fondo.mp4">
  </video>

  <!-- O IMAGEN (opcional)
  <img src="fondo.jpg">
  -->

  <div class="overlay"></div>
</div>

<!-- =========================
   HERO
   ========================= -->
<div class="hero">
  <div class="hero-content">

    <h1 id="name" class="luxury-name"></h1>
    <p id="subtitle" class="subtitle"></p>

    <button class="btn" onclick="scrollToInfo()">Ver invitación</button>
    <button class="btn" onclick="toggleMusic()">🎵 Música</button>

    <audio id="music">
      <source src="musica.mp3">
    </audio>
  </div>
</div>

<!-- =========================
   CONTENIDO
   ========================= -->
<section id="info">

<!-- COUNTDOWN -->
<div class="box">
  <h2>⏳ Cuenta regresiva</h2>

  <div class="countdown">
    <div class="time"><span id="d">0</span>Días</div>
    <div class="time"><span id="h">0</span>Horas</div>
    <div class="time"><span id="m">0</span>Min</div>
    <div class="time"><span id="s">0</span>Seg</div>
  </div>
</div>

<!-- UBICACIÓN -->
<div class="box">
  <h2>📍 Ubicación</h2>
  <a class="button" id="map" target="_blank">Ver ubicación</a>
</div>

<!-- WHATSAPP -->
<div class="box">
  <h2>💬 Confirmación</h2>
  <a class="button" id="wa" target="_blank">Confirmar asistencia</a>
</div>

<!-- GALERÍA -->
<div class="box">
  <h2>📸 Álbum de Fotos</h2>

  <div class="carousel">
    <div class="slides">
      <img src="foto1.png">
      <img src="foto2.jpg">
      <img src="principal.jpg">
    </div>
  </div>
</div>

</section>

<script>

/* =========================
   ⚙️ CONFIG (EDITAR SOLO AQUÍ)
   ========================= */
const CONFIG = {
  name:"Sofía",
  subtitle:"Mis 15 años - Una noche inolvidable",

  eventDate:"2026-12-20T20:00:00",

  whatsapp:"59895090806",
  whatsappText:"Hola! Confirmo mi asistencia a los 15 años",

  mapURL:"https://www.google.com/maps"
};

/* =========================
   INYECTAR DATOS
   ========================= */
document.getElementById("name").innerText = CONFIG.name;
document.getElementById("subtitle").innerText = CONFIG.subtitle;

document.getElementById("wa").href =
`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(CONFIG.whatsappText)}`;

document.getElementById("map").href = CONFIG.mapURL;

/* =========================
   COUNTDOWN
   ========================= */
const event = new Date(CONFIG.eventDate).getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const diff = event - now;

  document.getElementById("d").innerText=Math.floor(diff/86400000);
  document.getElementById("h").innerText=Math.floor((diff%86400000)/3600000);
  document.getElementById("m").innerText=Math.floor((diff%3600000)/60000);
  document.getElementById("s").innerText=Math.floor((diff%60000)/1000);
},1000);

/* =========================
   FUNCIONES
   ========================= */
function scrollToInfo(){
  document.getElementById("info").scrollIntoView({behavior:"smooth"});
}

function toggleMusic(){
  const m=document.getElementById("music");
  m.paused?m.play():m.pause();
}
</script>

</body>
</html>
