<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invitación Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
:root {
  --color-principal: #d4af37;
  --color-fondo: #000;
  --overlay: rgba(0,0,0,0.55);
}

/* ===== BASE ===== */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Montserrat', sans-serif;
  background: var(--color-fondo);
  color:white;
  overflow-x:hidden;
}

/* ===== FONDO DINÁMICO ===== */
.background {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  overflow:hidden;
}

/* VIDEO FONDO */
.background video {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY */
.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background: var(--overlay);
}

/* ===== HERO ===== */
.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

.hero-content {
  z-index:2;
  animation: fadeIn 2s ease;
}

h1 {
  font-family:'Playfair Display', serif;
  font-size:3rem;
}

.btn {
  margin-top:20px;
  padding:12px 25px;
  background: var(--color-principal);
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

/* ===== SECCIONES ===== */
section {
  padding:60px 20px;
  text-align:center;
}

.box {
  max-width:800px;
  margin:auto;
  background:#141414;
  padding:25px;
  border-radius:15px;
  margin-bottom:25px;
}

/* ===== CARRUSEL ===== */
.carousel {
  width:100%;
  max-width:700px;
  margin:auto;
  overflow:hidden;
  border-radius:15px;
  position:relative;
}

.slides {
  display:flex;
  width:300%;
  animation: slide 12s infinite;
}

.slides img {
  width:100%;
  flex-shrink:0;
}

@keyframes slide {
  0% {transform:translateX(0);}
  33% {transform:translateX(-100%);}
  66% {transform:translateX(-200%);}
  100% {transform:translateX(0);}
}

/* ===== COUNTDOWN ===== */
.countdown {
  font-size:2rem;
  color:var(--color-principal);
  font-weight:bold;
}

/* ===== BOTONES ===== */
a.button {
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:var(--color-principal);
  color:black;
  text-decoration:none;
  border-radius:30px;
  font-weight:bold;
}

/* ===== ANIMACIÓN ===== */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- =========================
     🔥 FONDO (EDITABLE)
     ========================= -->

<div class="background">

  <!-- OPCIÓN 1: VIDEO (ACTIVADO POR DEFECTO) -->
  <video autoplay muted loop playsinline>
    <source src="fondo.mp4" type="video/mp4">
  </video>

  <!-- OPCIÓN 2: IMAGEN (si no usas video, BORRAS el <video> y dejas esto)
  <img src="fondo.jpg" style="width:100%;height:100%;object-fit:cover;">
  -->

  <div class="overlay"></div>
</div>

<!-- =========================
     PORTADA
     ========================= -->
<div class="hero">
  <div class="hero-content">
    <h1>Mis 15 Años</h1>
    <p>Una noche única e inolvidable</p>

    <button class="btn" onclick="document.getElementById('info').scrollIntoView({behavior:'smooth'})">
      Ver invitación
    </button>
  </div>
</div>

<!-- =========================
     CONTENIDO
     ========================= -->
<section id="info">

  <!-- COUNTDOWN -->
  <div class="box">
    <h2>⏳ Falta poco</h2>
    <div class="countdown" id="countdown"></div>
  </div>

  <!-- UBICACIÓN -->
  <div class="box">
    <h2>📍 Ubicación</h2>
    <a class="button" href="#" target="_blank">Ver en Google Maps</a>
  </div>

  <!-- WHATSAPP -->
  <div class="box">
    <h2>💬 Confirmación</h2>
    <a class="button"
       href="https://wa.me/59895090806?text=Confirmo%20mi%20asistencia"
       target="_blank">
      Confirmar por WhatsApp
    </a>
  </div>

  <!-- =========================
       CARRUSEL
       ========================= -->
  <div class="box">
    <h2>📸 Galería</h2>

    <div class="carousel">
      <div class="slides">
        <img src="foto1.png">
        <img src="foto2.jpg">
        <img src="principal.jpg">
      </div>
    </div>
  </div>

</section>

<!-- =========================
     COUNTDOWN SCRIPT
     ========================= -->
<script>
const eventDate = new Date("2026-12-20T20:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = eventDate - now;

  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  const s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    `${d}d ${h}h ${m}m ${s}s`;

}, 1000);
</script>

</body>
</html>
