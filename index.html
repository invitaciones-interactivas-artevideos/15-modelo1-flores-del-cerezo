<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invitación Sofía - 15 años</title>

<!-- 💎 TIPOGRAFÍAS -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>

:root{
 --primary:#ff6f91;
  --bg:#000;
  --text:#fff;
  --title-font:'Dancing Script', cursive;
  --body-font:'Montserrat', sans-serif;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:var(--body-font);
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ================= BACKGROUND ================= */
.background{
  position:fixed;
  inset:0;
  z-index:-1;
}

.background video,
.background img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.6);
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}

/* ================= HERO ================= */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-content{
  animation:fadeUp 1.5s ease;
}

/* 💎 NOMBRE */
.luxury-name{
  font-family:var(--title-font);
  font-size:5rem;
  color:#fff;
  text-shadow:0 0 20px rgba(212,175,55,0.4);
}

/* 💎 MIS 15 AÑOS */
.main-title{
  font-family:var(--title-font);
  font-size:3rem;
  margin-top:10px;
  color:var(--primary);
}

/* SUBTÍTULO */
.subtitle{
  font-family:var(--body-font);
  margin-top:8px;
  opacity:0.9;
}

/* BOTONES */
.btn{
  margin-top:15px;
  padding:12px 22px;
  border:none;
  border-radius:30px;
  background:var(--primary);
  color:#001;
  font-weight:bold;
  cursor:pointer;
}

/* SECCIONES */
section{
  padding:60px 20px;
  text-align:center;
}

.box{
  max-width:850px;
  margin:auto;
  background:#141414;
  padding:25px;
  border-radius:15px;
  margin-bottom:25px;
}

/* COUNTDOWN */
.countdown{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.time{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  min-width:80px;
}

.time span{
  font-size:1.6rem;
  color:var(--primary);
  display:block;
  font-weight:bold;
}

/* CARRUSEL */
.carousel{
  overflow:hidden;
  border-radius:15px;
}

.slides{
  display:flex;
  animation:slide 12s infinite;
}

.slides img{
  width:100%;
  height:380px;
  object-fit:cover;
}

/* BOTÓN LINK */
a.button{
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:var(--primary);
  color:#000;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}

/* ANIMACIONES */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes slide{
  0%{transform:translateX(0);}
  33%{transform:translateX(-100%);}
  66%{transform:translateX(-200%);}
  100%{transform:translateX(0);}
}

</style>
</head>

<body>

<!-- 🎬 FONDO -->
<div class="background">
  <video autoplay muted loop playsinline>
    <source src="fondo.mp4">
  </video>
  <div class="overlay"></div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">

    <h1 id="name" class="luxury-name"></h1>

    <div class="main-title">Mis 15 años</div>
    <div class="subtitle">Una noche inolvidable</div>

    <button class="btn" onclick="scrollToInfo()">Ver invitación</button>
    <button class="btn" onclick="toggleMusic()">🎵 Música</button>

    <audio id="music">
      <source src="musica.mp3">
    </audio>

  </div>
</div>

<!-- CONTENIDO -->
<section id="info">

<div class="box">
  <h2>⏳ Faltan...</h2>
  <div class="countdown">
    <div class="time"><span id="d"></span>Días</div>
    <div class="time"><span id="h"></span>Horas</div>
    <div class="time"><span id="m"></span>Min</div>
    <div class="time"><span id="s"></span>Seg</div>
  </div>
</div>

<div class="box">
  <h2>📌¿Cómo llegar?</h2>
  <a class="button" href="https://www.google.com/maps" target="_blank">Ver ubicación</a>
</div>

<div class="box">
  <h2>💬 ¡Tu presencia es muy importante!</h2>
  <a class="button"
     href="https://wa.me/59895090806?text=Hola! Confirmo mi asistencia"
     target="_blank">
     Confirma tu asistencia
  </a>
</div>

<div class="box">
  <h2>📸 Mi álbum de recuerdos</h2>
  <div class="carousel">
    <div class="slides">
      <img src="foto1.png">
      <img src="foto2.jpg">
      <img src="principal.jpg">
      <img src="10añosnena2.jpg">
    </div>
  </div>
</div>

</section>

<script>

/* ⚙️ CONFIG */
const CONFIG = {
  name:"Sofía",
  eventDate:"2026-12-20T20:00:00"
};

/* INYECTAR */
document.getElementById("name").innerText = CONFIG.name;

/* COUNTDOWN */
const event = new Date(CONFIG.eventDate).getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const diff = event - now;

  document.getElementById("d").innerText=Math.floor(diff/86400000);
  document.getElementById("h").innerText=Math.floor((diff%86400000)/3600000);
  document.getElementById("m").innerText=Math.floor((diff%3600000)/60000);
  document.getElementById("s").innerText=Math.floor((diff%60000)/1000);
},1000);

/* MÚSICA */
function toggleMusic(){
  const m=document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

/* SCROLL */
function scrollToInfo(){
  document.getElementById("info").scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
