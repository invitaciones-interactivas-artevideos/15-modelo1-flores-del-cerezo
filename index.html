<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invitación Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #d4af37;
  --bg: #0b0b0b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Montserrat', sans-serif;
  background:var(--bg);
  color:white;
}

/* ===== HERO ===== */
.hero {
  height:100vh;
  background:url('principal.jpg') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.hero-content {
  position:relative;
  z-index:2;
}

h1 {
  font-family:'Playfair Display', serif;
  font-size:3rem;
}

.btn {
  margin-top:15px;
  padding:12px 22px;
  background:var(--gold);
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}

/* ===== SECCIONES ===== */
section {
  padding:60px 20px;
  text-align:center;
}

.box {
  max-width:800px;
  margin:auto;
  background:#151515;
  padding:25px;
  border-radius:15px;
  margin-bottom:25px;
}

/* ===== COUNTDOWN PRO ===== */
.countdown {
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:15px;
}

.time-box {
  background:#1f1f1f;
  padding:15px;
  border-radius:12px;
  min-width:80px;
}

.time-box span {
  display:block;
  font-size:1.5rem;
  color:var(--gold);
  font-weight:bold;
}

/* ===== CARRUSEL FIX ===== */
.carousel {
  width:100%;
  overflow:hidden;
  border-radius:15px;
}

.slides {
  display:flex;
  animation: slide 12s infinite;
}

.slides img {
  width:100%;
  height:350px;
  object-fit:cover; /* 🔥 FIX ZOOM */
  flex-shrink:0;
}

@keyframes slide {
  0%{transform:translateX(0);}
  33%{transform:translateX(-100%);}
  66%{transform:translateX(-200%);}
  100%{transform:translateX(0);}
}

/* ===== BOTONES ===== */
a.button {
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:var(--gold);
  color:black;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}

/* ===== MÚSICA ===== */
.music-btn {
  margin-top:15px;
  background:#222;
  color:white;
  padding:10px 15px;
  border-radius:20px;
  border:1px solid var(--gold);
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Mis 15 Años</h1>
    <p>Una noche inolvidable</p>

    <button class="btn" onclick="scrollToInfo()">Ver invitación</button>

    <!-- 🎵 MÚSICA CONTROLADA -->
    <button class="music-btn" onclick="toggleMusic()">🎵 Reproducir música</button>

    <audio id="music">
      <source src="musica.mp3" type="audio/mpeg">
    </audio>
  </div>
</div>

<!-- CONTENIDO -->
<section id="info">

<!-- COUNTDOWN BONITO -->
<div class="box">
  <h2>⏳ Cuenta regresiva</h2>

  <div class="countdown">
    <div class="time-box"><span id="days">0</span>Días</div>
    <div class="time-box"><span id="hours">0</span>Horas</div>
    <div class="time-box"><span id="minutes">0</span>Min</div>
    <div class="time-box"><span id="seconds">0</span>Seg</div>
  </div>
</div>

<!-- UBICACIÓN -->
<div class="box">
  <h2>📍 Ubicación</h2>
  <a class="button" href="#" target="_blank">Ver en Google Maps</a>
</div>

<!-- CARRUSEL -->
<div class="box">
  <h2>📸 Galería</h2>

  <div class="carousel">
    <div class="slides">
      <img src="foto1.png">
      <img src="foto2.jpg">
      <img src="1año.jpg">
      <img src="10añosnena2.jpg">
      <img src="principal.jpg">
    </div>
  </div>
</div>

</section>

<script>

/* ===== SCROLL ===== */
function scrollToInfo(){
  document.getElementById("info").scrollIntoView({behavior:"smooth"});
}

/* ===== MÚSICA FIX ===== */
function toggleMusic(){
  const music = document.getElementById("music");

  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}

/* ===== COUNTDOWN ===== */
const eventDate = new Date("2026-12-20T20:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = eventDate - now;

  document.getElementById("days").innerText = Math.floor(diff/(1000*60*60*24));
  document.getElementById("hours").innerText = Math.floor((diff/(1000*60*60))%24);
  document.getElementById("minutes").innerText = Math.floor((diff/1000/60)%60);
  document.getElementById("seconds").innerText = Math.floor((diff/1000)%60);

}, 1000);

</script>

</body>
</html>
